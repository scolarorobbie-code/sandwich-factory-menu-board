name = "sandwich-factory-backend"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret config. Real secrets (SQUARE_ACCESS_TOKEN, SQUARE_WEBHOOK_SIGNATURE_KEY,
# JWT_SIGNING_SECRET) are set with `wrangler secret put <NAME>` and NEVER committed.
[vars]
SQUARE_ENVIRONMENT = "sandbox"
SQUARE_API_VERSION = "2026-01-22"
# Leave blank to run on mock data. Fill these (non-secret) when you connect Square sandbox:
SQUARE_LOCATION_ID = ""
SQUARE_APPLICATION_ID = ""

# Idempotency + webhook de-dupe storage. Create with:
#   wrangler kv namespace create IDEMPOTENCY
# then paste the returned id below.
# [[kv_namespaces]]
# binding = "IDEMPOTENCY"
# id = "<your-kv-namespace-id>"
